  <style>

    /* Quiet ambient glow for section/body headings — the type itself should

      width: 50px;
      height: 50px;

      border-top-color: #fff;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Orbs ── */
    .orb-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.045;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #d0d0d0 0%, transparent 70%);
      top: -100px; left: -150px;
      animation: drift1 22s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #a0a0a0 0%, transparent 70%);
      bottom: 10%; right: -100px;
      animation: drift2 28s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #c0c0c0 0%, transparent 70%);
      top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      animation: drift3 18s ease-in-out infinite alternate;
    }
    @keyframes drift1 {
      0%   { transform: translate(0,0); }
      100% { transform: translate(120px, 180px); }
    }
    @keyframes drift2 {
      0%   { transform: translate(0,0); }
      100% { transform: translate(-100px, -140px); }
    }
    @keyframes drift3 {
      0%   { transform: translate(-50%,-50%) scale(1); }
      100% { transform: translate(-40%,-60%) scale(1.15); }

    .hero-grid {

    /* ══════════════════════════════════════════
       3D ROTATING BACKGROUND LOGO
    ══════════════════════════════════════════ */
    .bg-logo-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-logo-scene {
      /* 3D perspective container */
      perspective: 1400px;
      width: min(620px, 88vw);
      height: min(620px, 88vw);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .bg-logo-obj {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      /* Rotation is driven entirely by JS now (so it can pick up exactly
         where the user left it); CSS here only handles the glow pulse. */
      animation: logo-glow 4s ease-in-out infinite;
    }
    /* Each layer = one copy of the logo, offset back on Z axis.
       Together they create the illusion of thickness / extrusion. */
    .bg-logo-obj .layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-logo-obj .layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    /* Front face — most visible */
    .bg-logo-obj .layer:nth-child(1) { transform: translateZ(0px);   opacity: 0.18; }
    /* Each layer behind dims — creates shadow/depth effect */
    .bg-logo-obj .layer:nth-child(2) { transform: translateZ(-8px);  opacity: 0.14; filter: brightness(0.85); }
    .bg-logo-obj .layer:nth-child(3) { transform: translateZ(-16px); opacity: 0.10; filter: brightness(0.70); }
    .bg-logo-obj .layer:nth-child(4) { transform: translateZ(-24px); opacity: 0.07; filter: brightness(0.55); }
    .bg-logo-obj .layer:nth-child(5) { transform: translateZ(-32px); opacity: 0.04; filter: brightness(0.40); }
    .bg-logo-obj .layer:nth-child(6) { transform: translateZ(-40px); opacity: 0.02; filter: brightness(0.25); }

    @keyframes logo-glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(200,200,200,0.3)); }
      50% { filter: drop-shadow(0 0 35px rgba(220,220,220,0.5)); }
    }

    /* Conic shimmer ring — rotates in sync, mimics light catching metal */
    .bg-logo-shimmer {
      position: absolute;
      inset: -18%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(220,220,220,0.08) 50deg,
        transparent 100deg,
        rgba(220,220,220,0.04) 185deg,
        transparent 240deg
      );
      animation: shimmer-rot 20s linear infinite;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: inset 0 0 60px rgba(200,200,200,0.15);
    }
    @keyframes shimmer-rot {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Responsive overrides ── */
    @media (max-width: 480px) {
      .bg-logo-scene { width: min(280px, 86vw); height: min(280px, 86vw); }
    }
    @media (max-width: 360px) {
      .orb-1 { width: 200px; height: 200px; filter: blur(50px); }
      .orb-2 { width: 180px; height: 180px; filter: blur(50px); }
      .orb-3 { width: 150px; height: 150px; filter: blur(50px); }
      .btn-primary, .btn-secondary { padding: 11px 18px; font-size: 13px; width: 100%; text-align: center; display: block; }
      .stat-card { padding: 12px 8px; }
      .stat-number { font-size: 1.25rem; }
      .stat-label { font-size: 10px; }
      .hero-grid { background-size: 40px 40px; }
    }
    @media (max-width: 767px) {

      .orb-2 { width: 220px; height: 220px; filter: blur(60px); }
      .orb-3 { width: 180px; height: 180px; filter: blur(60px); }
      section, footer, nav { max-width: 100vw; overflow-x: hidden; }
      .stat-grid-mobile { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; max-width: 100% !important; }
      .hero-buttons-wrap { flex-direction: column; width: 100%; }
      .hero-buttons-wrap a { width: 100%; text-align: center; }
      .cards-grid { grid-template-columns: 1fr !important; }
      .process-step-card { padding: 16px 18px !important; }
      .comp-desktop { display: none !important; }
      .comp-mobile  { display: flex !important; }
      .pricing-grid { grid-template-columns: 1fr !important; }
      .pricing-card-popular { margin-top: 20px; }
      .founders-grid { grid-template-columns: 1fr !important; max-width: 280px !important; }
      .footer-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
      .demo-card-inner { padding: 24px 16px !important; }
      .section-py { padding-top: 60px !important; padding-bottom: 60px !important; }
      .flex-hero-cta { flex-direction: column; align-items: stretch; }
      .flex-hero-cta a { text-align: center; }
    }
    @media (min-width: 768px) and (max-width: 1023px) {
      .orb-1 { width: 380px; height: 380px; }
      .orb-2 { width: 300px; height: 300px; }
      .orb-3 { width: 240px; height: 240px; }
      .stat-number { font-size: 1.8rem; }
    }
    img, video, iframe, svg { max-width: 100%; height: auto; }
  </style>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function useScrollAnim() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          entries => entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
          }),
          { threshold: 0.07, rootMargin: '0px 0px -30px 0px' }
        );
        el.querySelectorAll('.fade-in').forEach(i => obs.observe(i));
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function useCounter(target, duration = 1800) {
      const [count, setCount] = useState(0);
      const [started, setStarted] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !started) { setStarted(true); obs.disconnect(); }
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [started]);
      useEffect(() => {
        if (!started) return;
        let start = null;
        const step = ts => {
          if (!start) start = ts;
          const prog = Math.min((ts - start) / duration, 1);
          const ease = 1 - Math.pow(1 - prog, 3);
          setCount(Math.floor(ease * target));
          if (prog < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [started, target, duration]);
      return [ref, count];
    }

    function scrollTo(id) {
      document.querySelector(id)?.scrollIntoView({ behavior: 'smooth' });
    }

    function Navbar() {
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
useEffect(() => {
  const h = () => setIsMobile(window.innerWidth < 768);
  window.addEventListener('resize', h);
  return () => window.removeEventListener('resize', h);
}, []);

      const [open, setOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
      }, []);
      const links = [
        { label: 'Services', href: '#services' },
        { label: 'How It Works', href: '#process' },
        { label: 'Pricing', href: '#pricing' },
        { label: 'About', href: '#about' },
        { label: 'Contact', href: '#contact' },
      ];
      const nav = (e, href) => { e.preventDefault(); setOpen(false); scrollTo(href); };
      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'nav-blur border-b border-v-border' : ''}`} style={{position:'fixed',top:0,left:0,right:0,zIndex:50,width:'100%'}}>
          <div style={{maxWidth:1280,margin:'0 auto',padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',height:60}}>
            <a href="#" onClick={e=>{e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});}} style={{display:'flex',alignItems:'center',gap:10,textDecoration:'none',flexShrink:0}}>
              <img src="logo.png" alt="Veloro AI" style={{height:30,width:'auto'}} />
              <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:17,color:'#e8e8e8',letterSpacing:'-0.01em'}}>Veloro</span>
            </a>
            <div style={{display: isMobile ? 'none' : 'flex', alignItems:'center', gap:28}}>
              {links.map(l => (
                <a key={l.href} href={l.href} onClick={e=>nav(e,l.href)} style={{fontSize:13,color:'#555',textDecoration:'none',transition:'color 0.2s',whiteSpace:'nowrap'}}
                  onMouseEnter={e=>e.target.style.color='#e8e8e8'} onMouseLeave={e=>e.target.style.color='#555'}>{l.label}</a>
              ))}
              <a href="https://cal.com/veloroai" target="_blank" rel="noopener noreferrer" className="btn-primary" style={{padding:'10px 22px',fontSize:13,whiteSpace:'nowrap'}}>Book a Demo</a>
            </div>
            <button style={{display: isMobile ? 'flex' : 'none', background:'none', border:'none', cursor:'pointer', color:'#e8e8e8', padding:8, alignItems:'center', justifyContent:'center'}} onClick={()=>setOpen(!open)}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                {open ? <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></> : <><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></>}
              </svg>
            </button>

  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("loader-screen");
      setTimeout(() => {
        loader.style.opacity = "0";
        setTimeout(() => loader.remove(), 500);
      }, 500);
    });

    // ── Interactive logo rotation ──
    // currentY / currentX are the single source of truth for the logo's
    // rotation. Both "idle auto-spin" and "user is scrolling/moving the
    // mouse" read from and write to these, so switching between the two
    // never snaps back to a fixed start position — it always continues
    // from wherever the logo already was.
    const logoObj = document.querySelector('.bg-logo-obj');

    let currentY = 0;
    let currentX = 10;

    let idleRafId = null;
    let idleStartTs = null;
    let idleStartY = 0;
    let idleStartX = 10;
    let resumeTimeout = null;

    const SPIN_SPEED = 360 / 20000;   // deg per ms — same pace as the old loop
    const WOBBLE_BASE = 9;
    const WOBBLE_AMPLITUDE = 5;
    const WOBBLE_PERIOD = 20000;

    function applyTransform(y, x) {
      if (!logoObj) return;
      logoObj.style.transform = `rotateY(${y}deg) rotateX(${x}deg)`;
      currentY = y;
      currentX = x;
    }

    function idleFrame(ts) {
      if (idleStartTs === null) {
        idleStartTs = ts;
        idleStartY = currentY;
        idleStartX = currentX;
      }
      const elapsed = ts - idleStartTs;
      const y = idleStartY + elapsed * SPIN_SPEED;
      // ease X gently into the ambient wobble instead of snapping to it
      const blend = Math.min(elapsed / 1200, 1);
      const wobbleX = WOBBLE_BASE + WOBBLE_AMPLITUDE * Math.sin((elapsed / WOBBLE_PERIOD) * 2 * Math.PI);
      const x = idleStartX + (wobbleX - idleStartX) * blend;
      applyTransform(y, x);
      idleRafId = requestAnimationFrame(idleFrame);
    }

    function cancelIdleSpin() {
      if (idleRafId !== null) { cancelAnimationFrame(idleRafId); idleRafId = null; }
      idleStartTs = null;
    }

    function startIdleSpin() {
      cancelIdleSpin();
      idleRafId = requestAnimationFrame(idleFrame);
    }

    function scheduleIdleResume() {
      clearTimeout(resumeTimeout);
      resumeTimeout = setTimeout(startIdleSpin, 800);
    }

    let scrollProgress = 0;
    let mouseOffsetX = 0;
    let mouseOffsetY = 0;

    function handleInteraction() {
      cancelIdleSpin();
      applyTransform(scrollProgress + mouseOffsetX, 10 + mouseOffsetY);
      scheduleIdleResume();
    }

    window.addEventListener('scroll', () => {
      const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
      scrollProgress = scrollHeight > 0 ? (window.scrollY / scrollHeight) * 360 : 0;
      handleInteraction();
    }, { passive: true });

    document.addEventListener('mousemove', (e) => {
      mouseOffsetX = (e.clientX / window.innerWidth - 0.5) * 50;
      mouseOffsetY = (e.clientY / window.innerHeight - 0.5) * 50;
      handleInteraction();
    });

    // Start the idle spin immediately on load. There's only ever one
    // rotation system now, so there's nothing to "switch back" to.
    startIdleSpin();
  </script>
