  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Scroll reveal hook ── */
    function useScrollAnim() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          entries => entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
          }),
          { threshold: 0.07, rootMargin: '0px 0px -30px 0px' }
        );
        el.querySelectorAll('.fade-in').forEach(i => obs.observe(i));
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    /* ── Animated counter hook ── */
    function useCounter(target, duration = 1800) {
      const [count, setCount] = useState(0);
      const [started, setStarted] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !started) { setStarted(true); obs.disconnect(); }
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [started]);
      useEffect(() => {
        if (!started) return;
        let start = null;
        const step = ts => {
          if (!start) start = ts;
          const prog = Math.min((ts - start) / duration, 1);
          const ease = 1 - Math.pow(1 - prog, 3);
          setCount(Math.floor(ease * target));
          if (prog < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [started, target, duration]);
      return [ref, count];
    }

    function scrollTo(id) {
      document.querySelector(id)?.scrollIntoView({ behavior: 'smooth' });
    }

                  onMouseEnter={e=>e.target.style.color='#e8e8e8'} onMouseLeave={e=>e.target.style.color='#555'}>{l.label}</a>

            method:'POST',
            headers:{'Content-Type':'application/json','Accept':'application/json'},
            body:JSON.stringify(form),
          });
          if (res.ok) { setStatus('success'); setForm({name:'',company:'',email:'',message:''}); }
          else { setStatus('error'); }
        } catch { setStatus('error'); }
      };
      return (
        <section ref={ref} id="contact" className="py-24 md:py-32 px-6">
          <div className="max-w-xl mx-auto">
            <div className="text-center mb-12">
              <span className="fade-in section-label">Contact</span>
              <h2 className="fade-in font-display" style={{fontSize:'clamp(1.9rem,4vw,3rem)',fontWeight:700,color:'#e8e8e8',letterSpacing:'-0.025em',marginTop:16,lineHeight:1.1}}>
                Ready to Stop<br/><span className="gradient-text">Missing Calls?</span>
              </h2>
            </div>
            <form onSubmit={handleSubmit} className="fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
              <input type="text" name="name" placeholder="Full Name *" required value={form.name} onChange={handleChange} className="input-field"/>
              <input type="text" name="company" placeholder="Company / Clinic Name *" required value={form.company} onChange={handleChange} className="input-field"/>
              <input type="email" name="email" placeholder="Email Address *" required value={form.email} onChange={handleChange} className="input-field"/>
              <textarea name="message" placeholder="What are you looking for? *" required rows="4" value={form.message} onChange={handleChange} className="input-field" style={{resize:'vertical'}}/>
              <button type="submit" className="btn-primary" style={{width:'100%',textAlign:'center'}} disabled={status==='sending'}>
                {status==='sending' ? 'Sending...' : 'Send Message'}
              </button>
              {status==='success' && <p style={{color:'#a0a0a0',fontSize:13,textAlign:'center'}}>Message sent! We'll get back to you soon.</p>}
              {status==='error' && <p style={{color:'#666',fontSize:13,textAlign:'center'}}>Something went wrong. Email us at teamveloro@gmail.com</p>}
            </form>
            <p className="fade-in" style={{textAlign:'center',color:'#444',fontSize:13,marginTop:24}}>
              Or book directly: <a href="https://cal.com/veloroai" target="_blank" rel="noopener noreferrer" className="gradient-text" style={{fontWeight:600,textDecoration:'none'}}>Book a Free Demo →</a>
            </p>
          </div>
        </section>
      );
    }

    /* ────────────────── FINAL CTA ────────────────── */
    function FinalCTA() {
      const ref = useScrollAnim();
      return (
        <section ref={ref} className="py-24 md:py-32 px-6 relative overflow-hidden">
          <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,rgba(160,160,160,0.04) 0%,transparent 65%)',pointerEvents:'none'}}></div>
          <div style={{position:'absolute',top:0,left:0,right:0,height:1,background:'linear-gradient(90deg,transparent,#222,transparent)'}}></div>
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:1,background:'linear-gradient(90deg,transparent,#1a1a1a,transparent)'}}></div>
          <div className="relative z-10 max-w-3xl mx-auto text-center">
            <h2 className="fade-in font-display" style={{fontSize:'clamp(2rem,5vw,3.4rem)',fontWeight:700,color:'#e8e8e8',letterSpacing:'-0.03em',marginBottom:18,lineHeight:1.05}}>
              Your Next Patient Shouldn't<br/><span className="gradient-text">Go to Voicemail.</span>
            </h2>
            <p className="fade-in" style={{color:'#444',fontSize:16,marginBottom:40,lineHeight:1.75,transitionDelay:'0.1s'}}>Book a free demo and see exactly how Veloro can be set up for your clinic.</p>
            <a href="https://cal.com/veloroai" target="_blank" rel="noopener noreferrer" className="fade-in btn-primary" style={{fontSize:15,padding:'15px 36px',transitionDelay:'0.15s'}}>Book a Free Demo</a>
          </div>
        </section>
      );
    }

    /* ────────────────── FOOTER ────────────────── */
    function Footer() {
      const links = [
        { label:'Services', href:'#services' },
        { label:'How It Works', href:'#process' },
        { label:'Pricing', href:'#pricing' },
        { label:'About', href:'#about' },
        { label:'Contact', href:'#contact' },
      ];
      return (
        <footer style={{borderTop:'1px solid #141414',padding:'48px 24px 28px',background:'#050505'}}>
          <div className="max-w-6xl mx-auto">
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:36,marginBottom:40}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <img src="logo.png" alt="Veloro AI" style={{height:30,width:'auto'}}/>
                  <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:16,color:'#e0e0e0'}}>Veloro</span>
                </div>
                <p style={{color:'#333',fontSize:13,lineHeight:1.65,maxWidth:200}}>AI Automation Systems for Modern Businesses</p>
              </div>
              <div>
                <h4 style={{color:'#444',fontWeight:600,fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:16,fontFamily:"'Space Grotesk',sans-serif"}}>Quick Links</h4>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {links.map(l => <a key={l.href} href={l.href} onClick={e=>{e.preventDefault();scrollTo(l.href);}} style={{color:'#444',fontSize:13,textDecoration:'none',transition:'color 0.2s'}} onMouseEnter={e=>e.target.style.color='#bbb'} onMouseLeave={e=>e.target.style.color='#444'}>{l.label}</a>)}
                </div>
              </div>
              <div>
                <h4 style={{color:'#444',fontWeight:600,fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:16,fontFamily:"'Space Grotesk',sans-serif"}}>Get in Touch</h4>
                <a href="mailto:teamveloro@gmail.com" style={{color:'#444',fontSize:13,textDecoration:'none',display:'block',marginBottom:16}} onMouseEnter={e=>e.target.style.color='#bbb'} onMouseLeave={e=>e.target.style.color='#444'}>teamveloro@gmail.com</a>
                <div style={{display:'flex',gap:14}}>
                  <a href="https://www.instagram.com/veloro_ai/" target="_blank" rel="noopener noreferrer" style={{color:'#333',transition:'color 0.2s'}} onMouseEnter={e=>e.target.style.color='#bbb'} onMouseLeave={e=>e.target.style.color='#333'} aria-label="Instagram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                  </a>
                  <a href="https://www.linkedin.com/company/veloroaims" target="_blank" rel="noopener noreferrer" style={{color:'#333',transition:'color 0.2s'}} onMouseEnter={e=>e.target.style.color='#bbb'} onMouseLeave={e=>e.target.style.color='#333'} aria-label="LinkedIn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                  </a>
                </div>
              </div>
            </div>
            <div style={{borderTop:'1px solid #111',paddingTop:20,textAlign:'center'}}>
              <p style={{color:'#2a2a2a',fontSize:12}}>© 2025 Veloro AI. All rights reserved.</p>
            </div>
          </div>
        </footer>
      );
    }

    /* ────────────────── APP ────────────────── */
    function App() {
      return (
        <div style={{background:'#080808',minHeight:'100vh'}}>
          <Navbar/>
          <Hero/>
          <PainPoints/>
          <Services/>
          <HowItWorks/>
          <DemoSection/>
          <UseCases/>
          <Comparison/>
          <Pricing/>
          <About/>
          <FAQ/>
          <Contact/>
          <FinalCTA/>
          <Footer/>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
